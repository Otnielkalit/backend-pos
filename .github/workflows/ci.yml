name: CI

# Trigger: setiap PR ke main & push ke main
# PR ke main → wajib lolos sebelum bisa di-merge (enforce via branch protection rules)
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Batalkan run lama jika ada push baru ke branch yang sama (hemat runner minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # Menggunakan golangci-lint action resmi — lebih cepat dari install manual
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Test
  # Menjalankan seluruh unit test dengan race detector
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Build
  # Verifikasi bahwa project bisa dikompilasi tanpa error
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]   # hanya build jika lint & test lolos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o bin/pos-backend ./cmd/api/main.go
          echo "✅ Build successful"

      - name: Verify binary exists
        run: ls -lh bin/pos-backend
